<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bento PDV</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b);
}

.login-box{
    width:350px;
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 0 25px rgba(0,0,0,0.3);
}

.logo{
    text-align:center;
    margin-bottom:30px;
}

.logo h1{
    color:#0f172a;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ddd;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#0f172a;
    color:white;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    opacity:0.9;
}

.footer{
    text-align:center;
    margin-top:20px;
    font-size:12px;
    color:#777;
}
</style>
</head>

<body>

<div class="login-box">

    <div class="logo">
        <h1>Bento PDV</h1>
        <p>Sistema de Gestão</p>
    </div>

    <form>
        <input type="text" placeholder="Usuário">
        <input type="password" placeholder="Senha">
        <button type="submit">Entrar</button>
    </form>

    <div class="footer">
        Versão 1.0
    </div>

</div>

</body>
</html>
