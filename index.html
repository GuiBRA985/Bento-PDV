<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lanchonete PDV</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f; --bg2: #1a1a1a; --bg3: #141414;
    --border: #2a2a2a; --accent: #e8a020; --text: #f5f0e8;
    --muted: #888; --dim: #444;
  }
  body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  button { font-family: 'Syne', sans-serif; cursor: pointer; border: none; transition: all .15s; }
  input, select, textarea { font-family: 'Syne', sans-serif; outline: none; }

  /* ── LOGIN ── */
  #tela-login {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: var(--bg);
  }
  .login-box {
    background-image: url('data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wCEAAYGBgYHBgcICAcKCwoLCg8ODAwODxYQERAREBYiFRkVFRkVIh4kHhweJB42KiYmKjY+NDI0PkxERExfWl98fKcBBgYGBgcGBwgIBwoLCgsKDw4MDA[...]
    background-repeat: no-repeat;
    background-size: 220% auto;
    background-position: center 40%;
    border: 2px solid var(--accent);
    border-radius: 20px;
    padding: 50px 40px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 0 40px rgba(232, 160, 32, 0.3), 0 20px 60px rgba(0, 0, 0, 0.8);
    position: relative;
    overflow: hidden;
  }
  .login-box > * {
    position: relative;
    z-index: 1;
  }
  
  /* Overlay semi-transparente apenas para os inputs ficarem mais legíveis */
  .login-overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(255, 255, 255, 0.92);
    z-index: 0;
  }
  
  /* Ajuste das fontes para melhor visibilidade */
  .login-logo {
    color: #1a1a1a !important;
    text-shadow: none;
    font-weight: 900;
    font-size: 28px;
    letter-spacing: 2px;
    margin-bottom: 40px;
    display: flex;
    align-items: center;
    gap: 10px;
    justify-content: center;
  }
  .login-label {
    color: #2a2a2a !important;
    text-shadow: none;
    font-weight: 900;
    font-size: 13px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .login-input {
    background: rgba(255, 255, 255, 1) !important;
    color: #1a1a1a !important;
    border: 2.5px solid #2a2a2a !important;
    font-weight: 600;
    font-size: 16px;
    border-radius: 10px;
    padding: 14px 16px;
    width: 100%;
    margin-bottom: 20px;
  }
  .login-input:focus {
    border-color: var(--accent) !important;
    box-shadow: 0 0 0 3px rgba(232, 160, 32, 0.1);
  }
  .login-input::placeholder {
    color: #999 !important;
    font-weight: 500;
  }
  
  /* Detalhe prateado abaixo do campo de senha */
  .password-detail {
    width: 100%;
    height: 8px;
    background: linear-gradient(90deg, transparent, #c0c0c0, transparent);
    border-radius: 4px;
    margin-bottom: 24px;
    margin-top: -8px;
  }
  
  .login-btn {
    box-shadow: 0 8px 25px rgba(232, 160, 32, 0.4);
    font-weight: 900;
    font-size: 16px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    transition: all 0.3s ease;
    width: 100%;
    padding: 15px 0;
    background: var(--accent);
    color: var(--bg);
    border-radius: 10px;
    margin-top: 8px;
  }
  .login-btn:hover {
    filter: brightness(1.15);
    box-shadow: 0 12px 35px rgba(232, 160, 32, 0.6);
    transform: translateY(-2px);
  }
  
  .login-erro { 
    color: #f87171; 
    font-size: 13px; 
    text-align: center; 
    margin-top: 16px; 
    min-height: 18px; 
    font-weight: 600; 
  }

  /* ── APP ── */
  #app { display: none; }

  header {
    background: var(--bg2); border-bottom: 2px solid var(--accent);
    height: 56px; padding: 0 20px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .logo { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 18px; letter-spacing: 1px; color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .perfil-badge { font-size: 12px; color: var(--muted); background: var(--border); padding: 4px 10px; border-radius: 20px; font-weight: 700; }
  nav { display: flex; gap: 6px; }
  .nav-btn { padding: 6px 14px; border-radius: 6px; font-weight: 700; font-size: 13px; color: var(--muted); background: var(--border); }
  .nav-btn.active { background: var(--accent); color: var(--bg); }
  .btn-sair { padding: 6px 12px; border-radius: 6px; font-weight: 700; font-size: 12px; color: #f87171; background: #2a1515; }
  .btn-sair:hover { background: #3a1515; }

  #toast {
    position: fixed; top: 68px; left: 50%; transform: translateX(-50%);
    background: var(--bg2); border: 1px solid var(--accent); color: var(--text);
    padding: 10px 22px; border-radius: 8px; font-weight: 700; font-size: 14px;
    box-shadow: 0 4px 20px #0006; z-index: 999;
    opacity: 0; pointer-events: none; transition: opacity .3s;
  }
  #toast.show { opacity: 1; }

  /* ── NOVO PEDIDO ── */
  #tela-novo { display: flex; height: calc(100vh - 56px); }
  #col-cardapio { flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--border); overflow: hidden; }
  #categorias { display: flex; border-bottom: 1px solid var(--border); overflow-x: auto; flex-shrink: 0; }
  #categorias::-webkit-scrollbar { height: 4px; }
  #categorias::-webkit-scrollbar-thumb { background: var(--border); }
  .cat-btn { padding: 12px 16px; background: transparent; color: var(--muted); font-weight: 700; font-size: 13px; white-space: nowrap; border-bottom: 2px solid transparent; }
  .cat-btn.active { background: var(--accent); color: var(--bg); }
  #itens-grid { flex: 1; overflow-y: auto; padding: 16px; display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; align-content: start; }
  .item-card { background: var(--bg2); border: 1.5px solid var(--border); border-radius: 10px; padding: 14px 12px; cursor: pointer; position: relative; }
  .item-card:hover { border-color: var(--accent); }
  .item-card.selecionado { background: #1e1a0f; border-color: var(--accent); }
  .item-badge { position: absolute; top: 8px; right: 8px; background: var(--accent); color: var(--bg); border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-c[...]
  .item-nome { font-weight: 700; font-size: 14px; margin-bottom: 6px; }
  .item-preco { color: var(--accent); font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 15px; }

  #col-pedido { width: 320px; display: flex; flex-direction: column; background: var(--bg3); flex-shrink: 0; }
  #sec-cliente { padding: 14px 16px; border-bottom: 1px solid var(--border); }
  .sec-label { font-size: 11px; color: var(--muted); font-weight: 700; letter-spacing: 1px; margin-bottom: 8px; }
  .tipo-btns { display: flex; gap: 8px; margin-bottom: 12px; }
  .tipo-btn { flex: 1; padding: 8px 0; border-radius: 7px; font-weight: 700; font-size: 13px; background: var(--border); color: var(--muted); }
  .tipo-btn.active { background: var(--accent); color: var(--bg); }
  .input-field { width: 100%; background: var(--bg2); border: 1.5px solid var(--border); border-radius: 7px; color: var(--text); padding: 9px 12px; font-size: 14px; font-family: 'Syne', sans-seri[...]
  .input-field:focus { border-color: var(--accent); }
  select.input-field option { background: var(--bg2); }
  #campo-carro { display: flex; flex-direction: column; gap: 8px; }
  #sec-itens { flex: 1; overflow-y: auto; padding: 12px 16px; }
  #lista-carrinho { margin-top: 8px; }
  .carrinho-vazio { color: var(--dim); font-size: 13px; text-align: center; margin-top: 30px; }
  .carr-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .carr-nome { flex: 1; font-size: 13px; }
  .qty-ctrl { display: flex; align-items: center; gap: 6px; }
  .qty-btn { width: 24px; height: 24px; border-radius: 50%; background: var(--border); color: var(--text); font-size: 16px; display: flex; align-items: center; justify-content: center; line-heigh[...]
  .qty-num { width: 20px; text-align: center; font-weight: 700; font-size: 14px; }
  .carr-preco { font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--accent); min-width: 60px; text-align: right; }
  #sec-rodape { padding: 12px 16px; border-top: 1px solid var(--border); }
  textarea.input-field { resize: none; margin-bottom: 12px; }
  .total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .total-label { font-size: 13px; color: var(--muted); font-weight: 700; }
  .total-valor { font-family: 'IBM Plex Mono', monospace; font-size: 20px; font-weight: 700; color: var(--accent); }
  #btn-confirmar { width: 100%; padding: 13px 0; background: var(--accent); color: var(--bg); border-radius: 8px; font-size: 15px; font-weight: 800; letter-spacing: 1px; }
  #btn-confirmar:hover { filter: brightness(1.1); }

  /* ── PAINEL ── */
  #tela-painel { padding: 20px; max-width: 1000px; margin: 0 auto; }
  .painel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
  .painel-titulo { font-size: 20px; font-weight: 800; color: var(--accent); }
  .painel-count { font-size: 13px; color: #666; }
  .painel-vazio { text-align: center; color: var(--dim); margin-top: 60px; font-size: 15px; line-height: 2; }
  #grid-pedidos { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
  .pedido-card { background: var(--bg2); border-radius: 12px; padding: 16px; border: 1.5px solid transparent; }
  .pedido-card.entregue { opacity: .5; }
  .pedido-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .pedido-cliente { font-weight: 800; font-size: 16px; }
  .pedido-info { font-size: 11px; color: #666; font-family: 'IBM Plex Mono', monospace; }
  .status-badge { border-radius: 5px; padding: 3px 8px; font-size: 11px; font-weight: 700; border: 1px solid; white-space: nowrap; }
  .pedido-itens { margin-bottom: 10px; font-size: 13px; }
  .ped-row { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid #222; }
  .ped-row-preco { color: var(--accent); font-family: 'IBM Plex Mono', monospace; }
  .pedido-obs { font-size: 12px; color: var(--muted); font-style: italic; margin-bottom: 10px; background: #111; padding: 6px 10px; border-radius: 6px; }
  .pedido-total { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .ped-total-label { font-size: 12px; color: var(--muted); font-weight: 700; }
  .ped-total-valor { font-family: 'IBM Plex Mono', monospace; font-weight: 700; color: var(--accent); }
  .status-btns { display: flex; gap: 6px; flex-wrap: wrap; }
  .status-btn { flex: 1; padding: 7px 4px; border-radius: 6px; font-weight: 700; font-size: 11px; background: var(--border); color: #777; min-width: 58px; }

  /* ── COZINHA só-leitura ── */
  .cozinha-aviso { background: #1a1200; border: 1px solid #e8a02044; border-radius: 8px; padding: 10px 16px; font-size: 13px; color: var(--muted); margin-bottom: 16px; text-align: center; }

  /* ── LIMPAR DIA ── */
  #btn-limpar { padding: 7px 14px; border-radius: 6px; font-weight: 700; font-size: 12px; color: #f87171; background: #2a1515; }
  #btn-limpar:hover { background: #3a1515; }

  @media (max-width: 640px) {
    #tela-novo { flex-direction: column; height: auto; }
    #col-cardapio { height: 55vh; }
    #col-pedido { width: 100%; height: auto; }
    #itens-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
  }
</style>
</head>
<body>

<!-- ══ TELA DE LOGIN ══ -->
<div id="tela-login">
  <div class="login-box">
    <div class="login-overlay"></div>
    <div class="login-logo">🍔 LANCHONETE PDV</div>
    <div class="login-label">USUÁRIO</div>
    <input class="login-input" id="login-user" type="text" placeholder="Digite seu usuário" autocomplete="username" />
    <div class="login-label">SENHA</div>
    <input class="login-input" id="login-senha" type="password" placeholder="••••••••" autocomplete="current-password" />
    <div class="password-detail"></div>
    <button class="login-btn" onclick="fazerLogin()">ENTRAR</button>
    <div class="login-erro" id="login-erro"></div>
  </div>
</div>

<!-- ══ APP PRINCIPAL ══ -->
<div id="app">
  <header>
    <div class="logo"><span>🍔</span> LANCHONETE PDV</div>
    <div class="header-right">
      <span class="perfil-badge" id="perfil-badge">—</span>
      <nav id="nav-bar">
        <button class="nav-btn active" id="nav-novo" onclick="irPara('novo')">＋ Pedido</button>
        <button class="nav-btn" id="nav-painel" onclick="irPara('painel')">📋 Painel</button>
      </nav>
      <button class="btn-sair" onclick="fazerLogout()">Sair</button>
    </div>
  </header>

  <div id="toast"></div>

  <!-- NOVO PEDIDO -->
  <div id="tela-novo">
    <div id="col-cardapio">
      <div id="categorias"></div>
      <div id="itens-grid"></div>
    </div>
    <div id="col-pedido">
      <div id="sec-cliente">
        <div class="sec-label">CLIENTE</div>
        <div class="tipo-btns">
          <button class="tipo-btn active" id="btn-mesa" onclick="setTipo('mesa')">🍽 Mesa</button>
          <button class="tipo-btn" id="btn-carro" onclick="setTipo('carro')">🚗 Carro</button>
        </div>
        <div id="campo-mesa">
          <input class="input-field" id="input-nome" type="text" placeholder="Nome / Mesa ex: João, Mesa 3..." />
        </div>
        <div id="campo-carro" style="display:none">
          <select class="input-field" id="select-cor">
            <option value="">Cor do carro...</option>
            <option>Branco</option><option>Prata</option><option>Preto</option>
            <option>Vermelho</option><option>Azul</option><option>Cinza</option>
            <option>Verde</option><option>Amarelo</option><option>Laranja</option>
            <option>Marrom</option><option>Bege</option><option>Vinho</option>
            <option>Dourado</option><option>Rosa</option><option>Roxo</option>
          </select>
          <input class="input-field" id="input-placa" type="text" placeholder="Placa ex: ABC1D23" maxlength="8" style="font-family:'IBM Plex Mono',monospace;letter-spacing:2px;text-transform:uppe[...]
        </div>
      </div>
      <div id="sec-itens">
        <div class="sec-label">ITENS DO PEDIDO</div>
        <div id="lista-carrinho"><div class="carrinho-vazio">Toque nos itens para adicionar</div></div>
      </div>
      <div id="sec-rodape">
        <textarea class="input-field" id="input-obs" rows="2" placeholder="Observações (sem cebola, bem passado...)"></textarea>
        <div class="total-row">
          <span class="total-label">TOTAL</span>
          <span class="total-valor" id="total-valor">R$ 0,00</span>
        </div>
        <button id="btn-confirmar" onclick="confirmarPedido()">REGISTRAR PEDIDO</button>
      </div>
    </div>
  </div>

  <!-- PAINEL -->
  <div id="tela-painel" style="display:none">
    <div class="painel-header">
      <span class="painel-titulo">📋 PEDIDOS</span>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <span class="painel-count" id="painel-count">0 ativos</span>
        <button id="btn-limpar" onclick="limparEntregues()">🗑 Limpar entregues</button>
      </div>
    </div>
    <div id="painel-vazio" class="painel-vazio" style="display:none">Nenhum pedido ainda.<br>Crie um novo pedido para começar.</div>
    <div id="grid-pedidos"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// USUÁRIOS  —  altere aqui as credenciais
// perfil: "caixa" (acesso total) | "cozinha" (só painel)
// ══════════════════════════════════════════════
const USUARIOS = [
  { usuario: "admin",   senha: "lancho123",  perfil: "caixa",   nome: "Caixa" },
  { usuario: "cozinha", senha: "cozinha321", perfil: "cozinha", nome: "Cozinha" },
];

const CARDAPIO = [
  { id:1,  cat:"🍔 Lanches",           nome:"X-Burguer",         preco:12.00 },
  { id:2,  cat:"🍔 Lanches",           nome:"X-Salada",          preco:14.00 },
  { id:3,  cat:"🍔 Lanches",           nome:"X-Bacon",           preco:16.00 },
  { id:4,  cat:"🍔 Lanches",           nome:"X-Tudo",            preco:18.00 },
  { id:5,  cat:"🌭 Cachorros-quentes", nome:"Hot Dog Simples",   preco:8.00  },
  { id:6,  cat:"🌭 Cachorros-quentes", nome:"Hot Dog Completo",  preco:11.00 },
  { id:7,  cat:"🍟 Porções",           nome:"Fritas Pequena",    preco:9.00  },
  { id:8,  cat:"🍟 Porções",           nome:"Fritas Grande",     preco:14.00 },
  { id:9,  cat:"🍟 Porções",           nome:"Nuggets (8un)",     preco:12.00 },
  { id:10, cat:"🥤 Bebidas",           nome:"Refrigerante Lata", preco:5.00  },
  { id:11, cat:"🥤 Bebidas",           nome:"Suco Natural",      preco:7.00  },
  { id:12, cat:"🥤 Bebidas",           nome:"Água",              preco:3.00  },
  { id:13, cat:"🥤 Bebidas",           nome:"Café",              preco:4.00  },
  { id:14, cat:"🍨 Sobremesas",        nome:"Sorvete Casquinha", preco:5.00  },
  { id:15, cat:"🍨 Sobremesas",        nome:"Açaí 300ml",        preco:13.00 },
];

const STATUS = {
  aberto:   { label:"Aberto",     cor:"#f59e0b" },
  preparo:  { label:"Em preparo", cor:"#3b82f6" },
  pronto:   { label:"Pronto!",    cor:"#10b981" },
  entregue: { label:"Entregue",   cor:"#6b7280" },
};

const categorias = [...new Set(CARDAPIO.map(i => i.cat))];
let catAtiva    = categorias[0];
let tipoCliente = "mesa";
let carrinho    = [];
let pedidos     = [];
let pedidoId    = 1;
let usuarioAtual = null;

const fmt = v => "R$ " + v.toFixed(2).replace(".", ",");

// ── PERSISTÊNCIA ──────────────────────────────
function salvarPedidos() {
  localStorage.setItem("pdv_pedidos",   JSON.stringify(pedidos));
  localStorage.setItem("pdv_pedidoId",  pedidoId);
}
function carregarPedidos() {
  try {
    const p = localStorage.getItem("pdv_pedidos");
    const i = localStorage.getItem("pdv_pedidoId");
    if (p) pedidos   = JSON.parse(p);
    if (i) pedidoId  = parseInt(i) || 1;
  } catch(e) { pedidos = []; pedidoId = 1; }
}

// ── LOGIN / SESSÃO ────────────────────────────
function fazerLogin() {
  const u = document.getElementById("login-user").value.trim();
  const s = document.getElementById("login-senha").value;
  const match = USUARIOS.find(x => x.usuario === u && x.senha === s);
  if (!match) {
    document.getElementById("login-erro").textContent = "Usuário ou senha incorretos.";
    return;
  }
  usuarioAtual = match;
  sessionStorage.setItem("pdv_sessao", JSON.stringify(match));
  document.getElementById("login-erro").textContent = "";
  iniciarApp();
}

function fazerLogout() {
  sessionStorage.removeItem("pdv_sessao");
  usuarioAtual = null;
  document.getElementById("app").style.display          = "none";
  document.getElementById("tela-login").style.display   = "flex";
  document.getElementById("login-user").value  = "";
  document.getElementById("login-senha").value = "";
}

function verificarSessao() {
  try {
    const s = sessionStorage.getItem("pdv_sessao");
    if (s) { usuarioAtual = JSON.parse(s); return true; }
  } catch(e) {}
  return false;
}

function iniciarApp() {
  document.getElementById("tela-login").style.display = "none";
  document.getElementById("app").style.display        = "block";
  document.getElementById("perfil-badge").textContent = usuarioAtual.nome;

  const isCozinha = usuarioAtual.perfil === "cozinha";

  // Cozinha: esconde aba "Novo Pedido"
  document.getElementById("nav-novo").style.display = isCozinha ? "none" : "";

  carregarPedidos();

  if (isCozinha) {
    irPara("painel");
  } else {
    renderCategorias();
    renderItens();
    irPara("novo");
  }
}

// ── NAVEGAÇÃO ─────────────────────────────────
function irPara(tela) {
  document.getElementById("tela-novo").style.display   = tela === "novo"   ? "flex"  : "none";
  document.getElementById("tela-painel").style.display = tela === "painel" ? "block" : "none";
  document.getElementById("nav-novo").classList.toggle("active",   tela === "novo");
  document.getElementById("nav-painel").classList.toggle("active", tela === "painel");
  if (tela === "painel") renderPainel();
}

// ── TOAST ─────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

// ── TIPO CLIENTE ──────────────────────────────
function setTipo(tipo) {
  tipoCliente = tipo;
  document.getElementById("btn-mesa").classList.toggle("active",  tipo === "mesa");
  document.getElementById("btn-carro").classList.toggle("active", tipo === "carro");
  document.getElementById("campo-mesa").style.display  = tipo === "mesa"  ? "block" : "none";
  document.getElementById("campo-carro").style.display = tipo === "carro" ? "flex"  : "none";
}

// ── CARDÁPIO ──────────────────────────────────
function renderCategorias() {
  document.getElementById("categorias").innerHTML = categorias.map(c =>
    `<button class="cat-btn${c===catAtiva?" active":""}" onclick="setCategoria('${c.replace(/'/g,"\\'")}')"> ${c}</button>`
  ).join("");
}

function setCategoria(c) { catAtiva = c; renderCategorias(); renderItens(); }

function renderItens() {
  document.getElementById("itens-grid").innerHTML = CARDAPIO.filter(i => i.cat === catAtiva).map(item => {
    const qty = (carrinho.find(x => x.id === item.id) || {}).qty || 0;
    return `<div class="item-card${qty>0?" selecionado":""}" onclick="addItem(${item.id})">
      ${qty>0?`<div class="item-badge">${qty}</div>`:""}
      <div class="item-nome">${item.nome}</div>
      <div class="item-preco">${fmt(item.preco)}</div>
    </div>`;
  }).join("");
}

function addItem(id) {
  const item = CARDAPIO.find(i => i.id === id);
  const ex   = carrinho.find(x => x.id === id);
  if (ex) ex.qty++; else carrinho.push({...item, qty:1});
  renderItens(); renderCarrinho();
}

function removeItem(id) {
  const ex = carrinho.find(x => x.id === id);
  if (!ex) return;
  if (ex.qty === 1) carrinho = carrinho.filter(x => x.id !== id);
  else ex.qty--;
  renderItens(); renderCarrinho();
}

// ── CARRINHO ──────────────────────────────────
function renderCarrinho() {
  const el = document.getElementById("lista-carrinho");
  if (!carrinho.length) {
    el.innerHTML = `<div class="carrinho-vazio">Toque nos itens para adicionar</div>`;
    document.getElementById("total-valor").textContent = "R$ 0,00";
    return;
  }
  el.innerHTML = carrinho.map(x => `
    <div class="carr-row">
      <div class="carr-nome">${x.nome}</div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="removeItem(${x.id})">−</button>
        <span class="qty-num">${x.qty}</span>
        <button class="qty-btn" onclick="addItem(${x.id})">+</button>
      </div>
      <div class="carr-preco">${fmt(x.preco*x.qty)}</div>
    </div>`).join("");
  document.getElementById("total-valor").textContent = fmt(carrinho.reduce((s,x)=>s+x.preco*x.qty,0));
}

// ── CONFIRMAR PEDIDO ──────────────────────────
function getCliente() {
  if (tipoCliente === "mesa") {
    const n = document.getElementById("input-nome").value.trim();
    return n || null;
  }
  const cor   = document.getElementById("select-cor").value;
  const placa = document.getElementById("input-placa").value.replace(/[^A-Za-z0-9]/g,"").toUpperCase();
  return (cor && placa.length >= 7) ? `${cor} · ${placa}` : null;
}

function confirmarPedido() {
  const cliente = getCliente();
  if (!cliente)         { showToast("⚠️ Preencha os dados do cliente!"); return; }
  if (!carrinho.length) { showToast("⚠️ Carrinho vazio!"); return; }

  const total = carrinho.reduce((s,x)=>s+x.preco*x.qty,0);
  const obs   = document.getElementById("input-obs").value.trim();
  const hora  = new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});

  pedidos.unshift({ id:pedidoId++, tipo:tipoCliente, cliente, itens:[...carrinho], obs, total, status:"aberto", hora });
  salvarPedidos();
  showToast(`✅ Pedido #${pedidos[0].id} registrado!`);

  carrinho = [];
  document.getElementById("input-nome").value  = "";
  document.getElementById("select-cor").value  = "";
  document.getElementById("input-placa").value = "";
  document.getElementById("input-obs").value   = "";
  renderItens(); renderCarrinho();
  irPara("painel");
}

// ── PAINEL ────────────────────────────────────
function mudarStatus(id, status) {
  const p = pedidos.find(x => x.id === id);
  if (p) { p.status = status; salvarPedidos(); }
  renderPainel();
}

function limparEntregues() {
  if (!pedidos.some(p => p.status === "entregue")) { showToast("Nenhum pedido entregue."); return; }
  pedidos = pedidos.filter(p => p.status !== "entregue");
  salvarPedidos();
  renderPainel();
  showToast("🗑 Entregues removidos.");
}

function renderPainel() {
  const ativos = pedidos.filter(p => p.status !== "entregue").length;
  document.getElementById("painel-count").textContent = `${ativos} ativo${ativos!==1?"s":""}`;

  const grid  = document.getElementById("grid-pedidos");
  const vazio = document.getElementById("painel-vazio");

  // Cozinha: só vê não-entregues
  const isCozinha = usuarioAtual?.perfil === "cozinha";
  const lista = isCozinha ? pedidos.filter(p => p.status !== "entregue") : pedidos;

  if (!lista.length) { grid.innerHTML = ""; vazio.style.display = "block"; return; }
  vazio.style.display = "none";

  grid.innerHTML = lista.map(p => {
    const st  = STATUS[p.status];
    const ico = p.tipo === "carro" ? "🚗" : "🍽";
    const itensHTML = p.itens.map(x =>
      `<div class="ped-row"><span>${x.qty}× ${x.nome}</span><span class="ped-row-preco">${fmt(x.preco*x.qty)}</span></div>`
    ).join("");
    const obsHTML = p.obs ? `<div class="pedido-obs">📝 ${p.obs}</div>` : "";

    // Cozinha não vê botão "Entregue" nem total de dinheiro
    const statusKeys = isCozinha
      ? ["aberto","preparo","pronto"]
      : ["aberto","preparo","pronto","entregue"];

    const botoesStatus = statusKeys.map(k =>
      `<button class="status-btn" onclick="mudarStatus(${p.id},'${k}')" style="${p.status===k?`background:${STATUS[k].cor};color:#0f0f0f`:""}">${STATUS[k].label}</button>`
    ).join("");

    const totalHTML = !isCozinha ? `
      <div class="pedido-total">
        <span class="ped-total-label">TOTAL</span>
        <span class="ped-total-valor">${fmt(p.total)}</span>
      </div>` : "";

    return `
      <div class="pedido-card${p.status==="entregue"?" entregue":""}" style="border-color:${st.cor}40">
        <div class="pedido-top">
          <div>
            <div class="pedido-cliente">${ico} ${p.cliente}</div>
            <div class="pedido-info">#${p.id} · ${p.hora}</div>
          </div>
          <span class="status-badge" style="color:${st.cor};border-color:${st.cor};background:${st.cor}22">${st.label}</span>
        </div>
        <div class="pedido-itens">${itensHTML}</div>
        ${obsHTML}
        ${totalHTML}
        <div class="status-btns">${botoesStatus}</div>
      </div>`;
  }).join("");
}

// ── ENTER no login ────────────────────────────
document.getElementById("login-senha").addEventListener("keydown", e => {
  if (e.key === "Enter") fazerLogin();
});
document.getElementById("login-user").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("login-senha").focus();
});

// ── INIT ──────────────────────────────────────
if (verificarSessao()) iniciarApp();
</script>
