<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bento PDV - Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f6f9;
}

.header{
    background:#0f172a;
    color:white;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:24px;
    font-weight:bold;
}

.usuario{
    font-size:14px;
}

.container{
    padding:20px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 3px 10px rgba(0,0,0,.08);
    cursor:pointer;
    transition:.2s;
}

.card:hover{
    transform:translateY(-4px);
}

.card h3{
    margin-bottom:10px;
    color:#0f172a;
}

.card p{
    color:#666;
}

.resumo{
    margin-top:30px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.info{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.valor{
    font-size:28px;
    font-weight:bold;
    margin-top:10px;
    color:#0f172a;
}

</style>
</head>
<body>

<div class="header">
    <div class="logo">Bento PDV</div>
    <div class="usuario">Administrador</div>
</div>

<div class="container">

    <div class="cards">

        <div class="card">
            <h3>🛒 Nova Venda</h3>
            <p>Abrir frente de caixa</p>
        </div>

        <div class="card">
            <h3>📦 Produtos</h3>
            <p>Gerenciar estoque</p>
        </div>

        <div class="card">
            <h3>👥 Clientes</h3>
            <p>Cadastro de clientes</p>
        </div>

        <div class="card">
            <h3>💰 Financeiro</h3>
            <p>Fluxo de caixa</p>
        </div>

        <div class="card">
            <h3>📊 Relatórios</h3>
            <p>Análises e indicadores</p>
        </div>

        <div class="card">
            <h3>⚙️ Configurações</h3>
            <p>Parâmetros do sistema</p>
        </div>

    </div>

    <div class="resumo">

        <div class="info">
            <h4>Vendas Hoje</h4>
            <div class="valor">R$ 0,00</div>
        </div>

        <div class="info">
            <h4>Clientes</h4>
            <div class="valor">0</div>
        </div>

        <div class="info">
            <h4>Produtos</h4>
            <div class="valor">0</div>
        </div>

    </div>

</div>

</body>
</html>
